services:
  - type: web
    name: portfolio-website
    env: node
    region: oregon
    plan: free
    
    buildCommand: npm install
    startCommand: npm start
    
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "3000"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
